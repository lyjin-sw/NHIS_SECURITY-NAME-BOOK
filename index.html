<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제한통제구역 출입자 명부</title>
    <style>
        :root {
            --primary-color: #263238;
            --secondary-color: #37474f;
            --accent-color: #2196f3;
            --bg-color: #eceff1;
            --card-bg: #ffffff;
            --text-color: #263238;
            --border-color: #cfd8dc;
            --hover-color: #f5f7f8;
            --header-bg: #455a64;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--primary-color);
            color: var(--white);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .export-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .export-btn:hover {
            background-color: #1976d2;
        }

        /* 입력 폼 */
        .form-section {
            padding: 30px;
            border-bottom: 1px solid var(--border-color);
            background-color: #fafbfc;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--secondary-color);
        }

        .form-group input, .form-group select {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--accent-color);
        }

        .submit-btn {
            grid-column: span 1;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            align-self: flex-end;
            margin-top: 5px;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background-color: var(--primary-color);
        }

        /* 테이블 섹션 */
        .table-section {
            flex: 1;
            overflow: auto;
            max-height: 600px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            position: sticky;
            top: 0;
            background-color: var(--header-bg);
            color: white;
            z-index: 10;
        }

        th, td {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        tbody tr:hover {
            background-color: var(--hover-color);
        }

        .delete-btn {
            background-color: #ef5350;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .delete-btn:hover {
            background-color: #d32f2f;
        }

        /* 반응형 모바일 */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr 1fr;
            }
            .submit-btn {
                grid-column: span 2;
            }
            table {
                font-size: 0.85rem;
            }
            th, td {
                padding: 10px;
            }
        }

        @media (max-width: 480px) {
            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .submit-btn {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🔒 제한통제구역 출입자 명부</h1>
            <button class="export-btn" onclick="exportToCSV()">Excel 저장 (CSV)</button>
        </header>

        <section class="form-section">
            <div class="form-grid">
                <div class="form-group">
                    <label for="date">날짜</label>
                    <input type="date" id="date">
                </div>
                <div class="form-group">
                    <label for="purpose">용무</label>
                    <input type="text" id="purpose" placeholder="예: 점검, 방문 등">
                </div>
                <div class="form-group">
                    <label for="empId">사번</label>
                    <input type="text" id="empId" placeholder="사번 입력">
                </div>
                <div class="form-group">
                    <label for="affiliation">소속</label>
                    <input type="text" id="affiliation" placeholder="소속 부서">
                </div>
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" placeholder="이름 입력">
                </div>
                <div class="form-group">
                    <label for="entryTime">입실시간</label>
                    <input type="time" id="entryTime">
                </div>
                <div class="form-group">
                    <label for="exitTime">퇴실시간</label>
                    <input type="time" id="exitTime">
                </div>
                <button class="submit-btn" onclick="addData()">등록</button>
            </div>
        </section>

        <section class="table-section">
            <table id="logTable">
                <thead>
                    <tr>
                        <th>날짜</th>
                        <th>용무</th>
                        <th>사번</th>
                        <th>소속</th>
                        <th>이름</th>
                        <th>입실시간</th>
                        <th>퇴실시간</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody id="logBody">
                    <!-- 데이터가 여기에 추가됩니다 -->
                </tbody>
            </table>
        </section>
    </div>

    <script>
        // 초기 로드 시 실행
        document.addEventListener('DOMContentLoaded', () => {
            initInputs();
            loadData();
        });

        // 날짜 및 입실시간 자동 설정
        function initInputs() {
            const now = new Date();
            const dateInput = document.getElementById('date');
            const entryTimeInput = document.getElementById('entryTime');

            // KST 기준 날짜 (YYYY-MM-DD)
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            dateInput.value = `${year}-${month}-${day}`;

            // KST 기준 시간 (HH:MM)
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            entryTimeInput.value = `${hours}:${minutes}`;
        }

        // 데이터 로드
        function loadData() {
            const data = JSON.parse(localStorage.getItem('accessLogs') || '[]');
            renderTable(data);
        }

        // 테이블 렌더링
        function renderTable(data) {
            const tbody = document.getElementById('logBody');
            tbody.innerHTML = '';

            data.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.date}</td>
                    <td>${item.purpose}</td>
                    <td>${item.empId}</td>
                    <td>${item.affiliation}</td>
                    <td>${item.name}</td>
                    <td>${item.entryTime}</td>
                    <td>${item.exitTime || '-'}</td>
                    <td><button class="delete-btn" onclick="deleteData(${index})">삭제</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 데이터 추가
        function addData() {
            const date = document.getElementById('date').value;
            const purpose = document.getElementById('purpose').value;
            const empId = document.getElementById('empId').value;
            const affiliation = document.getElementById('affiliation').value;
            const name = document.getElementById('name').value;
            const entryTime = document.getElementById('entryTime').value;
            const exitTime = document.getElementById('exitTime').value;

            if (!date || !name || !empId) {
                alert('날짜, 사번, 이름은 필수 입력 항목입니다.');
                return;
            }

            const newItem = { date, purpose, empId, affiliation, name, entryTime, exitTime };
            const data = JSON.parse(localStorage.getItem('accessLogs') || '[]');
            data.push(newItem);
            localStorage.setItem('accessLogs', JSON.stringify(data));

            renderTable(data);
            clearForm();
        }

        // 폼 초기화 (날짜/시간은 유지 또는 자동 갱신)
        function clearForm() {
            document.getElementById('purpose').value = '';
            document.getElementById('empId').value = '';
            document.getElementById('affiliation').value = '';
            document.getElementById('name').value = '';
            document.getElementById('exitTime').value = '';
            initInputs();
        }

        // 데이터 삭제
        function deleteData(index) {
            if (!confirm('해당 기록을 삭제하시겠습니까?')) return;
            
            const data = JSON.parse(localStorage.getItem('accessLogs') || '[]');
            data.splice(index, 1);
            localStorage.setItem('accessLogs', JSON.stringify(data));
            renderTable(data);
        }

        // CSV 내보내기
        function exportToCSV() {
            const data = JSON.parse(localStorage.getItem('accessLogs') || '[]');
            if (data.length === 0) {
                alert('내보낼 데이터가 없습니다.');
                return;
            }

            let csvContent = "\uFEFF"; // Excel 한글 깨짐 방지 BOM
            csvContent += "날짜,용무,사번,소속,이름,입실시간,퇴실시간\n";

            data.forEach(item => {
                const row = [
                    item.date,
                    item.purpose,
                    item.empId,
                    item.affiliation,
                    item.name,
                    item.entryTime,
                    item.exitTime || ''
                ].map(v => `"${v}"`).join(",");
                csvContent += row + "\n";
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            
            const timestamp = new Date().toISOString().slice(0, 10);
            link.setAttribute("href", url);
            link.setAttribute("download", `출입자명부_${timestamp}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
